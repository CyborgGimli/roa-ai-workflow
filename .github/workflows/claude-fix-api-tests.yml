name: Claude Fix Failed API Tests

permissions:
  contents: write
  pull-requests: write
  actions: read

on:
  workflow_run:
    workflows: ["API Tests"]
    types: [completed]

concurrency:
  group: claude-fix-api-tests-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  claude-fix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout failing SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      # 1) Download the FULL workflow run logs (zip) from the failed run
      - name: Download workflow run logs (zip)
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const run_id = context.payload.workflow_run.id;
            const { owner, repo } = context.repo;
            
            const res = await github.rest.actions.downloadWorkflowRunLogs({
              owner,
              repo,
              run_id,
            });
            
            const fs = require("fs");
            fs.writeFileSync("failed-run-logs.zip", Buffer.from(res.data));
            core.info("Saved failed-run-logs.zip");

      - name: Unzip workflow logs
        run: |
          mkdir -p failed-run-logs
          unzip -o failed-run-logs.zip -d failed-run-logs
          echo "Unzipped workflow logs:"
          find failed-run-logs -maxdepth 3 -type f | sort | head -n 200

      # 2) Download artifacts produced by api-tests.yml (Allure report + allure-results)
      - name: Download Allure artifacts from failed run
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const run_id = context.payload.workflow_run.id;
            const { owner, repo } = context.repo;
            
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id
            });
            
            const fs = require("fs");
            const path = require("path");
            
            fs.mkdirSync("failed-run-artifacts", { recursive: true });
            
            // Prefer the merged final report if present, otherwise take all allure-results artifacts.
            const preferred = [
              "final-allure-report-api-test-framework",
            ];
            
            const picked = [];
            
            for (const name of preferred) {
              const found = artifacts.data.artifacts.find(a => a.name === name);
              if (found) picked.push(found);
            }
            
            if (picked.length === 0) {
              // Fallback: download all allure-related artifacts
              for (const a of artifacts.data.artifacts) {
                if (a.name.startsWith("allure-results-") || a.name.startsWith("final-allure-report")) {
                  picked.push(a);
                }
              }
            }
            
            core.info(`Artifacts total: ${artifacts.data.artifacts.length}`);
            core.info(`Artifacts selected: ${picked.map(a => a.name).join(", ") || "(none)"}`);
            
            for (const artifact of picked) {
              const download = await github.rest.actions.downloadArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
                archive_format: "zip",
              });
            
              const out = path.join("failed-run-artifacts", `${artifact.name}.zip`);
              fs.writeFileSync(out, Buffer.from(download.data));
              core.info(`Downloaded ${artifact.name} -> ${out}`);
            }

      - name: Unzip artifacts
        run: |
          mkdir -p failed-run-artifacts/unzipped
          shopt -s nullglob
          for f in failed-run-artifacts/*.zip; do
            unzip -o "$f" -d failed-run-artifacts/unzipped
          done
          echo "Artifacts extracted:"
          find failed-run-artifacts/unzipped -maxdepth 4 -type f | sort | head -n 200

      - name: Build failure summary for Claude
        run: |
          mkdir -p claude-context
          {
            echo "=== Build/test failures (top 100 matches) ==="
            grep -R --line-number -E \
              "BUILD FAILURE|FAILED|AssertionError|expected:|but was:|NoSuchMethodError|NullPointerException" \
              failed-run-logs failed-run-artifacts/unzipped 2>/dev/null \
              | grep -v "^Binary" \
              | head -n 100
          } > claude-context/failure-summary.txt
          
          echo "Wrote claude-context/failure-summary.txt ($(wc -l < claude-context/failure-summary.txt) lines)"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Make Maven runnable — local repo inside workspace so Claude can compile/test
      - name: Prepare local Maven repo inside workspace
        run: mkdir -p .m2/repository

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github-roa-libraries</id>
                <username>${{ secrets.GH_PACKAGES_USER }}</username>
                <password>${{ secrets.GH_PACKAGES_PAT }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download OpenAPI spec
        run: |
          mkdir -p specs
          curl -s https://reqres.in/openapi.json -o specs/openapi.json

      - name: Write MCP config
        run: |
          cat > $GITHUB_WORKSPACE/mcp-config.json << EOF
          {
            "mcpServers": {
              "reqres_openapi": {
                "command": "npx",
                "args": [
                  "-y",
                  "@ivotoby/openapi-mcp-server",
                  "--api-base-url", "https://reqres.in",
                  "--openapi-spec", "$GITHUB_WORKSPACE/specs/openapi.json"
                ]
              }
            }
          }
          EOF

      - name: Run Claude Code agent
        id: run_claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--max-turns 40 --model claude-sonnet-4-6 --mcp-config ${{ github.workspace }}/mcp-config.json --dangerously-skip-permissions"
          show_full_output: true
          prompt: |
            The "API Tests" GitHub Actions workflow failed.
            
            You have access to:
            - Full workflow logs under: failed-run-logs/
            - Allure report / results under: failed-run-artifacts/unzipped/
            - The repository checkout at the failing SHA
            - A local OpenAPI spec at: specs/openapi.json
            - An MCP server named: reqres_openapi
            
            Start by reading `claude-context/failure-summary.txt`. Only open other logs/artifacts if the summary is insufficient to identify the failing test(s) and root cause.
            
            Task:
            1) Identify the failing API test(s) and root cause using logs + Allure artifacts.
            2) Use the MCP server ONLY for contract lookup:
               - inspect endpoints
               - inspect request parameters
               - inspect response schemas
               - inspect expected status codes
            3) Do NOT use MCP for exploratory live API behavior unless absolutely necessary.
            4) Fix ONLY test code / test-support code in this repository (do not change unrelated app code).
            5) Prefer minimal changes. Do not disable tests or reduce coverage to "make it green".
            6) Prefer contract-aligned fixes over brittle assertion changes.
            7) After changes, run the Iteration loop (MUST follow):
               - Run: mvn -U -pl api-test-framework -am test -Dmaven.repo.local=$GITHUB_WORKSPACE/.m2/repository
               - If tests fail due to code/test reasons: apply the minimal fix, then rerun the same command.
               - Repeat until the command succeeds, but stop after 3 iterations and summarize why it can't be fixed safely.
               - If the failure is environmental (e.g., cannot resolve repo.maven.apache.org / network/DNS): retry up to 3 times with short pauses; if still failing, stop and report "environmental – cannot validate".
            8) Write a summary to `claude-output.md` containing:
               - root cause
               - whether MCP contract lookup was used
               - files changed
               - why this fix is correct
               - test command output summary
            
            Notes:
            - This is Java + Maven API automation using the ROA framework.
            - Focus on broken assertions, outdated contract expectations, data setup, and contract mismatches.
            - Follow all CLAUDE.md instructions present in the repository.

      - name: Show diff and detect changes
        id: changes
        run: |
          git status
          git diff --stat
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected — skipping PR creation."
          fi

      - name: Create PR with Claude fix
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          base: main
          commit-message: "fix(api-tests): Claude repair after failed API Tests run"
          branch: claude/fix-api-tests-${{ github.event.workflow_run.run_number }}
          title: "Claude fix: API Tests failed (run #${{ github.event.workflow_run.run_number }})"
          body: |
            Automated PR generated by Claude Code after a failed **API Tests** workflow run.
            
            - Run: ${{ github.event.workflow_run.html_url }}
            - SHA: ${{ github.event.workflow_run.head_sha }}
            
            Claude output: `claude-output.md`
          add-paths: |
            api-test-framework
            claude-output.md