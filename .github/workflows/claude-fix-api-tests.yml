name: Claude Fix Failed API Tests

permissions:
  contents: write
  pull-requests: write
  actions: write

on:
  workflow_run:
    workflows: ["API Tests"]
    types: [completed]

concurrency:
  group: claude-fix-api-tests-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  claude-fix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout failing SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Download workflow run logs (zip)
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const run_id = context.payload.workflow_run.id;
            const { owner, repo } = context.repo;
            const res = await github.rest.actions.downloadWorkflowRunLogs({ owner, repo, run_id });
            const fs = require("fs");
            fs.writeFileSync("failed-run-logs.zip", Buffer.from(res.data));
            core.info("Saved failed-run-logs.zip");

      - name: Unzip workflow logs
        run: |
          mkdir -p failed-run-logs
          unzip -o failed-run-logs.zip -d failed-run-logs

      - name: Download Allure artifacts from failed run
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const run_id = context.payload.workflow_run.id;
            const { owner, repo } = context.repo;
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({ owner, repo, run_id });
            const fs = require("fs");
            const path = require("path");
            fs.mkdirSync("failed-run-artifacts", { recursive: true });

            const preferred = ["final-allure-report-api-test-framework"];
            let picked = artifacts.data.artifacts.filter(a => preferred.includes(a.name));
            if (picked.length === 0) {
              picked = artifacts.data.artifacts.filter(a =>
                a.name.startsWith("allure-results-") || a.name.startsWith("final-allure-report")
              );
            }
            core.info(`Artifacts selected: ${picked.map(a => a.name).join(", ") || "(none)"}`);

            for (const artifact of picked) {
              const download = await github.rest.actions.downloadArtifact({
                owner, repo, artifact_id: artifact.id, archive_format: "zip",
              });
              const out = path.join("failed-run-artifacts", `${artifact.name}.zip`);
              fs.writeFileSync(out, Buffer.from(download.data));
            }

      - name: Unzip artifacts
        run: |
          mkdir -p failed-run-artifacts/unzipped
          shopt -s nullglob
          for f in failed-run-artifacts/*.zip; do
            unzip -o "$f" -d failed-run-artifacts/unzipped
          done

      - name: Build failure summary for Claude
        run: |
          mkdir -p claude-context
          {
            echo "=== Build/test failures (top 100 matches) ==="
            grep -R --line-number -E \
              "BUILD FAILURE|FAILED|AssertionError|expected:|but was:|NoSuchMethodError|NullPointerException" \
              failed-run-logs failed-run-artifacts/unzipped 2>/dev/null \
              | grep -v "^Binary" \
              | head -n 100
          } > claude-context/failure-summary.txt
          echo "Wrote failure-summary.txt ($(wc -l < claude-context/failure-summary.txt) lines)"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare local Maven repo inside workspace
        run: mkdir -p .m2/repository

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github-roa-libraries</id>
                <username>${{ secrets.GH_PACKAGES_USER }}</username>
                <password>${{ secrets.GH_PACKAGES_PAT }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download OpenAPI spec
        run: |
          mkdir -p specs
          curl -s https://reqres.in/openapi.json -o specs/openapi.json

      - name: Write MCP config
        run: |
          cat > $GITHUB_WORKSPACE/mcp-config.json << EOF
          {
            "mcpServers": {
              "reqres_openapi": {
                "command": "npx",
                "args": [
                  "-y",
                  "@ivotoby/openapi-mcp-server",
                  "--api-base-url", "https://reqres.in",
                  "--openapi-spec", "$GITHUB_WORKSPACE/specs/openapi.json"
                ]
              }
            }
          }
          EOF

      - name: Run Claude Code agent
        id: run_claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--max-turns 40 --model claude-sonnet-4-6 --mcp-config ${{ github.workspace }}/mcp-config.json --dangerously-skip-permissions"
          show_full_output: true
          prompt: |
            The "API Tests" GitHub Actions workflow failed.

            You have access to:
            - Full workflow logs under: failed-run-logs/
            - Allure report / results under: failed-run-artifacts/unzipped/
            - The repository checkout at the failing SHA
            - A local OpenAPI spec at: specs/openapi.json
            - An MCP server named: reqres_openapi

            Start by reading `claude-context/failure-summary.txt`. Only open other logs/artifacts if the summary is insufficient.

            Task:
            1) Identify the failing API test(s) and root cause using logs + Allure artifacts.
            2) Use the MCP server ONLY for contract lookup (endpoints, parameters, response schemas, status codes).
               If MCP returns 403, read specs/openapi.json directly instead.
            3) Fix ONLY test code / test-support code. Do not change unrelated app code.
            4) Prefer minimal changes. Do not disable tests or reduce coverage to make it green.
            5) Prefer contract-aligned fixes over brittle assertion changes.
            6) After changes, run the Iteration loop (MUST follow):
               - Run: mvn -U -pl api-test-framework -am test -Dmaven.repo.local=$GITHUB_WORKSPACE/.m2/repository
               - If tests fail due to code/test reasons: apply the minimal fix, then rerun the same command.
               - Keep iterating until ALL tests pass. Only stop if:
                 a) All tests pass — done, OR
                 b) 10 fix attempts exhausted — summarize why it cannot be fixed safely, OR
                 c) Environmental failure (network/DNS) — retry 3 times then report "environmental – cannot validate".
            7) When all tests pass, write EXACTLY the following block to `.claude-temp-results`:
               **Root cause:** <one-line description>
               **Files changed:** <comma-separated list>

               ✔ <TestMethodName> — SUCCESS
               ✔ <TestMethodName> — SUCCESS

               Tests run: N, Failures: 0, Errors: 0, Skipped: 0
               BUILD SUCCESS

            Notes:
            - Java + Maven API automation using the ROA framework.
            - Focus on broken assertions, outdated contract expectations, data setup, contract mismatches.
            - Follow all CLAUDE.md instructions present in the repository.
            - Do NOT create any other files. Only write `.claude-temp-results` as instructed above.

      - name: Show diff and detect changes
        id: changes
        run: |
          git status
          git diff --stat
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected — skipping PR creation."
          fi

      - name: Read Claude test summary
        id: summary
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          if [ -f ".claude-temp-results" ]; then
            {
              echo 'content<<SUMMARY_EOF'
              cat .claude-temp-results
              echo 'SUMMARY_EOF'
            } >> $GITHUB_OUTPUT
          else
            echo 'content=No test summary available.' >> $GITHUB_OUTPUT
          fi

      - name: Create PR with Claude fix
        id: create_pr
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          base: main
          commit-message: "fix(api-tests): Claude repair after failed API Tests run"
          branch: claude/fix-api-tests-${{ github.event.workflow_run.run_number }}
          title: "Claude fix: API Tests failed (run #${{ github.event.workflow_run.run_number }})"
          body: |
            Automated PR generated by Claude Code after a failed **API Tests** workflow run.

            - Failed run: ${{ github.event.workflow_run.html_url }}
            - SHA: ${{ github.event.workflow_run.head_sha }}

            ---

            ${{ steps.summary.outputs.content }}
          add-paths: |
            api-test-framework

      - name: Trigger API Tests on fix branch
        if: steps.changes.outputs.has_changes == 'true'
        id: trigger_tests
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const branch = 'claude/fix-api-tests-${{ github.event.workflow_run.run_number }}';
            const { owner, repo } = context.repo;

            core.info(`Dispatching API Tests on branch: ${branch}`);
            await github.rest.actions.createWorkflowDispatch({
              owner, repo,
              workflow_id: 'api-tests.yml',
              ref: branch,
              inputs: { tagsInclude: 'Regression', tagsExclude: 'Flaky' },
            });

            await new Promise(r => setTimeout(r, 15000));

            const runs = await github.rest.actions.listWorkflowRuns({
              owner, repo,
              workflow_id: 'api-tests.yml',
              branch,
              per_page: 1,
            });

            const run = runs.data.workflow_runs[0];
            if (!run) { core.setFailed('Dispatched run not found after 15s.'); return; }

            core.info(`Run found: ${run.html_url} (${run.status})`);
            core.setOutput('run_id', String(run.id));

      - name: Await CI verification
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const runId = parseInt('${{ steps.trigger_tests.outputs.run_id }}', 10);
            const { owner, repo } = context.repo;

            let run;
            do {
              await new Promise(r => setTimeout(r, 15000));
              run = (await github.rest.actions.getWorkflowRun({ owner, repo, run_id: runId })).data;
              core.info(`API Tests — status: ${run.status}`);
            } while (run.status !== 'completed');

            core.info(`API Tests — conclusion: ${run.conclusion}`);
            if (run.conclusion !== 'success') {
              core.setFailed(`API Tests still failing after Claude fix. Run: ${run.html_url}`);
            } else {
              core.info('All API Tests passed on the fix branch.');
            }
